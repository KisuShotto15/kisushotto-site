<svg width="100%" viewBox="0 0 100 100" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Body Metrics app icon</title>
  <desc>Dark rounded square icon showing a weight plate with an upward trend line in blue</desc>

  <rect width="100" height="100" rx="22" fill="#0a0b0e"/>

  <!-- Weight plate outer ring -->
  <circle cx="50" cy="52" r="26" fill="none" stroke="#3b82f6" stroke-width="2.4"/>
  <!-- Weight plate inner ring -->
  <circle cx="50" cy="52" r="18" fill="none" stroke="#3b82f6" stroke-width="1.6" stroke-opacity="0.5"/>
  <!-- Center hub -->
  <circle cx="50" cy="52" r="5" fill="#3b82f6" fill-opacity="0.8"/>

  <!-- Bar through plate -->
  <line x1="18" y1="52" x2="26" y2="52" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="74" y1="52" x2="82" y2="52" stroke="#3b82f6" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Upward trend line overlay (top-left area) -->
  <polyline points="22,36 32,30 42,33 52,26 62,29" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
  <!-- Trend arrow -->
  <polyline points="59,24 62,29 67,27" fill="none" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
</svg>
