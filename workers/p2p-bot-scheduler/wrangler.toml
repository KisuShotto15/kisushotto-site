name = "p2p-bot-scheduler"
main = "src/index.js"
compatibility_date = "2025-04-10"

# Durable Object que se auto-agenda (alarm) cada TICK_MS y dispara /api/bot-tick en Vercel.
[durable_objects]
bindings = [
  { name = "SCHEDULER", class_name = "BotScheduler" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["BotScheduler"]

# Self-heal: cada minuto re-asegura que la alarm este armada.
[triggers]
crons = ["* * * * *"]

[vars]
VERCEL_URL = "https://kisushotto-site.vercel.app"
TICK_MS = "18000"          # con bots habilitados
MONITOR_TICK_MS = "30000"  # solo monitor (su refresh minimo es 30s)
IDLE_TICK_MS = "900000"    # nada habilitado (GET /poke lo despierta al instante); alto para que Neon se suspenda

# Secreto compartido con Vercel (header x-bot-secret). Setear con:
#   wrangler secret put BOT_TICK_SECRET
