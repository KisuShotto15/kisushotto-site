name: Tests

on:
  push:
    paths: ['api/**', 'tests/**', 'package.json']
  pull_request:
    paths: ['api/**', 'tests/**', 'package.json']

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node --test tests/*.test.js
