<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0a0a10">
<meta name="color-scheme" content="dark">
<title>Notas — KS</title>
<link rel="icon" type="image/svg+xml" href="/images/notes-favicon.svg">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="topbar">
  <button class="btn-icon sidebar-toggle" id="sidebar-toggle" title="Menú">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
  </button>
  <a href="https://kisushotto.com" class="brand" title="Volver al Hub">
    <img src="/images/notes-icon.svg" alt="" width="28" height="28">
    <span class="brand-name">Notas</span>
  </a>
  <div class="search-wrap">
    <input type="search" id="search" placeholder="Buscar..." autocomplete="off">
  </div>
  <div class="topbar-actions">
    <button class="btn-icon" id="btn-settings" title="Ajustes" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg></button>
  </div>
</div>

<aside class="sidebar" id="sidebar">
  <nav class="sidebar-nav" id="sidebar-nav">
    <button class="sidebar-item active" data-view="all">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
      <span>Notas</span>
    </button>
    <button class="sidebar-item" data-view="shared">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg>
      <span>Compartidas</span>
    </button>
    <button class="sidebar-item" data-view="locked">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      <span>Protegidas</span>
    </button>
    <div class="sidebar-sep"></div>
    <div id="sidebar-cat-list"></div>
    <button class="sidebar-item sidebar-edit-labels" id="sidebar-edit-labels">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
      <span>Editar etiquetas</span>
    </button>
    <div class="sidebar-sep"></div>
    <button class="sidebar-item" data-view="archive">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg>
      <span>Archivo</span>
    </button>
    <button class="sidebar-item" data-view="trash">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
      <span>Papelera</span>
    </button>
  </nav>
</aside>
<div class="sidebar-backdrop" id="sidebar-backdrop"></div>

<main id="main">
  <section id="pinned-section" class="grid-section" hidden>
    <h2>📌 Fijadas</h2>
    <div class="masonry" id="grid-pinned"></div>
  </section>
  <section id="others-section" class="grid-section">
    <h2 id="others-title">Notas</h2>
    <div class="masonry" id="grid-others"></div>
    <div class="empty" id="empty-state" hidden>
      <p>No hay notas aquí.</p>
      <button class="btn-pri" onclick="window.NotesApp.openNew()">Crear la primera</button>
    </div>
  </section>
</main>

<button class="fab" id="fab-new" title="Nueva nota" onclick="window.NotesApp.openNew()">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
</button>

<div class="select-bar" id="select-bar" hidden>
  <button class="btn-icon" id="select-cancel" title="Cancelar">✕</button>
  <span id="select-count"></span>
  <div class="select-actions">
    <button class="btn-icon" id="select-pin" title="Fijar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg></button>
    <button class="btn-icon" id="select-cats" title="Categorías"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg></button>
    <button class="btn-icon" id="select-archive" title="Archivar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg></button>
    <button class="btn-icon select-danger" id="select-delete" title="Eliminar"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
  </div>
</div>


<!-- Editor modal -->
<div class="modal" id="editor" hidden>
  <div class="modal-bg" data-close onclick=""></div>
  <div class="modal-card editor-card">
    <div class="ed-toolbar">
      <button class="btn-icon" id="ed-close" data-close onclick="" title="Atrás"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"></path><polyline points="12 19 5 12 12 5"></polyline></svg></button>
      <span class="ed-status" id="ed-status"></span>
      <div class="ed-toolbar-right">
        <button class="btn-icon" id="ed-pin" title="Fijar" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="17" x2="12" y2="22"></line><path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"></path></svg></button>
        <button class="btn-icon" id="ed-reminder" title="Recordatorio" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg></button>
        <button class="btn-icon" id="ed-more" title="Más opciones" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"></circle><circle cx="12" cy="5" r="1"></circle><circle cx="12" cy="19" r="1"></circle></svg></button>
      </div>
    </div>
    <div class="ed-meta" id="ed-meta"></div>
    <input class="ed-title" id="ed-title" placeholder="Título" maxlength="200">
    <div class="ed-body-wrap">
      <textarea class="ed-body" id="ed-body" placeholder="Escribe..."></textarea>
      <div class="ed-checklist" id="ed-checklist-list" hidden></div>
    </div>
    <div class="ed-attachments" id="ed-attachments"></div>

    <div class="ed-bottom-bar">
      <button class="btn-icon" id="ed-add" title="Agregar" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
      <button class="btn-icon" id="ed-color" title="Color" onclick=""><svg width="20" height="20" viewBox="0 0 100 100" fill="currentColor" xmlns="http://www.w3.org/2000/svg"><path d="M50 5C25.1 5 5 25.1 5 50c0 13.8 6.3 26.1 16.2 34.3 3.4 2.8 5.4 7 5.4 11.4 0 3 2.4 4.3 4.3 4.3h38.2c1.9 0 4.3-1.3 4.3-4.3 0-4.4 2-8.6 5.4-11.4C89.7 76.1 96 63.8 96 50 96 25.1 75.9 5 51 5h-1zm14.5 28a7 7 0 1 1 0 14 7 7 0 0 1 0-14zm-29 0a7 7 0 1 1 0 14 7 7 0 0 1 0-14zm-10 22a7 7 0 1 1 14 0 7 7 0 0 1-14 0zm46 0a7 7 0 1 1 14 0 7 7 0 0 1-14 0z"/></svg></button>
      <div class="ed-undo-redo">
        <button class="btn-icon" id="ed-undo" title="Deshacer" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg></button>
        <button class="btn-icon" id="ed-redo" title="Rehacer" onclick=""><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg></button>
      </div>
    </div>

  </div>
</div>


<!-- More options popup -->
<div class="popup" id="popup-more" hidden>
  <div class="popup-menu">
    <button class="popup-menu-item" id="ed-categories" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg> Categorías</button>
    <button class="popup-menu-item" id="ed-share" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"></circle><circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="19" r="3"></circle><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line></svg> Compartir</button>
    <button class="popup-menu-item" id="ed-lock" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> Proteger</button>
    <button class="popup-menu-item" id="ed-archive" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="21 8 21 21 3 21 3 8"></polyline><rect x="1" y="3" width="22" height="5"></rect><line x1="10" y1="12" x2="14" y2="12"></line></svg> Archivar</button>
    <button class="popup-menu-item" id="ed-delete" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> Eliminar</button>
  </div>
</div>


<!-- Add options popup -->
<div class="popup" id="popup-add" hidden>
  <div class="popup-menu">
    <button class="popup-menu-item" id="ed-image" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Imagen</button>
    <button class="popup-menu-item" id="ed-audio" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg> Audio</button>
    <button class="popup-menu-item" id="ed-checklist" onclick=""><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg> Casillas de verificación</button>
  </div>
</div>

<!-- Color picker mini-popup -->
<div class="popup" id="popup-color" hidden>
  <div class="color-grid">
    <button class="color-swatch" data-color=""           style="background:transparent;border:1px dashed #555" onclick="">∅</button>
    <button class="color-swatch" data-color="#fef9c3"    style="background:#fef9c3" onclick=""></button>
    <button class="color-swatch" data-color="#fde68a"    style="background:#fde68a" onclick=""></button>
    <button class="color-swatch" data-color="#fed7aa"    style="background:#fed7aa" onclick=""></button>
    <button class="color-swatch" data-color="#fecaca"    style="background:#fecaca" onclick=""></button>
    <button class="color-swatch" data-color="#fda4af"    style="background:#fda4af" onclick=""></button>
    <button class="color-swatch" data-color="#fbcfe8"    style="background:#fbcfe8" onclick=""></button>
    <button class="color-swatch" data-color="#f5d0fe"    style="background:#f5d0fe" onclick=""></button>
    <button class="color-swatch" data-color="#c4b5fd"    style="background:#c4b5fd" onclick=""></button>
    <button class="color-swatch" data-color="#bfdbfe"    style="background:#bfdbfe" onclick=""></button>
    <button class="color-swatch" data-color="#bae6fd"    style="background:#bae6fd" onclick=""></button>
    <button class="color-swatch" data-color="#a7f3d0"    style="background:#a7f3d0" onclick=""></button>
    <button class="color-swatch" data-color="#bbf7d0"    style="background:#bbf7d0" onclick=""></button>
    <button class="color-swatch" data-color="#d9f99d"    style="background:#d9f99d" onclick=""></button>
    <button class="color-swatch" data-color="#a5f3fc"    style="background:#a5f3fc" onclick=""></button>
  </div>
</div>

<!-- Categories assigner popup -->
<div class="popup" id="popup-cats" hidden>
  <div class="popup-title">Categorías</div>
  <div id="popup-cats-list"></div>
  <div class="popup-foot">
    <input type="text" id="popup-new-cat" placeholder="Nueva categoría">
    <button class="btn-pri" id="popup-new-cat-btn" onclick="">+</button>
  </div>
</div>

<!-- Reminder popup -->
<div class="popup" id="popup-reminder" hidden>
  <div class="popup-title">Recordatorio</div>
  <input type="datetime-local" id="popup-reminder-input">
  <div class="popup-foot">
    <button class="btn-ghost" id="popup-reminder-clear" onclick="">Quitar</button>
    <button class="btn-pri"   id="popup-reminder-save" onclick="">Guardar</button>
  </div>
</div>

<!-- Share popup -->
<div class="popup" id="popup-share" hidden>
  <div class="popup-title">Compartir</div>
  <div id="popup-share-list"></div>
  <div class="popup-foot">
    <input type="email" id="popup-share-email" placeholder="email@ejemplo.com">
    <button class="btn-pri" id="popup-share-add" onclick="">+</button>
  </div>
</div>

<!-- PIN unlock modal -->
<div class="modal" id="pin-modal" hidden>
  <div class="modal-bg"></div>
  <div class="modal-card pin-card">
    <h3 id="pin-title">Desbloquear</h3>
    <p id="pin-msg" class="pin-msg">Ingresa tu PIN</p>
    <input type="password" id="pin-input" inputmode="numeric" maxlength="8" autocomplete="off" placeholder="••••">
    <div class="pin-actions">
      <button class="btn-ghost" id="pin-cancel" onclick="">Cancelar</button>
      <button class="btn-pri"   id="pin-submit" onclick="">Continuar</button>
    </div>
    <button class="btn-link" id="pin-biometric" hidden onclick="">Usar huella / Face ID</button>
  </div>
</div>

<!-- Settings drawer -->
<div class="drawer" id="drawer" hidden>
  <div class="drawer-bg" data-close-drawer onclick=""></div>
  <aside class="drawer-card">
    <header class="drawer-head">
      <h2>Ajustes</h2>
      <button class="btn-icon" data-close-drawer onclick="">✕</button>
    </header>
    <nav class="drawer-nav">
      <div class="drawer-section">Categorías</div>
      <div id="drawer-cat-list"></div>
      <div class="drawer-row">
        <input type="text" id="drawer-cat-name" placeholder="Nueva categoría">
        <button class="btn-pri" id="drawer-cat-add" onclick="">+</button>
      </div>
      <hr>
      <div class="drawer-section">Seguridad</div>
      <button class="drawer-item" id="drawer-set-pin" onclick="">Configurar PIN</button>
      <button class="drawer-item" id="drawer-webauthn" onclick="">Registrar huella / Face ID</button>
      <button class="drawer-item" id="drawer-test-push" onclick="">Activar notificaciones push</button>
      <hr>
      <div class="drawer-section">Cuenta</div>
      <div class="drawer-row" id="drawer-user"></div>
    </nav>
  </aside>
</div>

<!-- Set-PIN modal -->
<div class="modal" id="setpin-modal" hidden>
  <div class="modal-bg" data-close-setpin onclick=""></div>
  <div class="modal-card pin-card">
    <h3>Configurar PIN</h3>
    <p class="pin-msg">4 a 8 dígitos. Se usará para abrir notas protegidas.</p>
    <input type="password" id="setpin-input" inputmode="numeric" maxlength="8" placeholder="PIN">
    <input type="password" id="setpin-input2" inputmode="numeric" maxlength="8" placeholder="Confirmar">
    <div class="pin-actions">
      <button class="btn-ghost" data-close-setpin onclick="">Cancelar</button>
      <button class="btn-pri"   id="setpin-save" onclick="">Guardar</button>
    </div>
  </div>
</div>

<input type="file" id="file-image" accept="image/*" hidden>

<div class="net-banner" id="net-banner" hidden>Sin conexión — los cambios se sincronizarán al volver</div>

<div id="lightbox" hidden>
  <div id="lightbox-bg"></div>
  <img id="lightbox-img" alt="">
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
