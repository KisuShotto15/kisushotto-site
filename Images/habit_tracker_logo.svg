<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 110 110" style="">
  <!-- Dark background matching habit tracker -->
  <rect width="100" height="100" rx="22" fill="#0d0d0f" style="fill:rgb(13, 13, 15);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Outer ring (progress circle style) -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#1e1e2e" stroke-width="6" style="fill:none;stroke:rgb(30, 30, 46);color:rgb(255, 255, 255);stroke-width:6px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Progress arc ~75% (270deg) purple accent -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#7c6af7" stroke-width="6" stroke-linecap="round" stroke-dasharray="169.6 56.5" stroke-dashoffset="56.5" transform="rotate(-90 50 50)" style="fill:none;stroke:rgb(124, 106, 247);color:rgb(255, 255, 255);stroke-width:6px;stroke-dasharray:169.6px, 56.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Inner subtle ring -->
  <circle cx="50" cy="50" r="26" fill="#13131a" stroke="#1e1e2e" stroke-width="1.5" style="fill:rgb(19, 19, 26);stroke:rgb(30, 30, 46);color:rgb(255, 255, 255);stroke-width:1.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Checkmark -->
  <polyline points="37,50 46,60 64,40" fill="none" stroke="#7c6af7" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" style="fill:none;stroke:rgb(124, 106, 247);color:rgb(255, 255, 255);stroke-width:4.5px;stroke-linecap:round;stroke-linejoin:round;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Small streak flame dot bottom-right -->
  <circle cx="74" cy="74" r="10" fill="#1a1a2a" stroke="#f0b90b" stroke-width="2" style="fill:rgb(26, 26, 42);stroke:rgb(240, 185, 11);color:rgb(255, 255, 255);stroke-width:2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- flame shape simplified as path -->
  <path d="M74 68 C71 70 70 73 72 75 C73 76.5 75 76.5 76 75 C78 73 77 70 74 68Z" fill="#f0b90b" style="fill:rgb(240, 185, 11);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>