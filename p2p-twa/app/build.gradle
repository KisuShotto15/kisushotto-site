plugins { id 'com.android.application' }
android {
    namespace 'com.kisushotto.p2p'
    compileSdk 34
    defaultConfig {
        applicationId 'com.kisushotto.p2p'
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName '1.0.0'
    }
    signingConfigs {
        release {
            storeFile file('../../p2p-twa.keystore')
            storePassword 'p2p2024'
            keyAlias 'p2p-key'
            keyPassword 'p2p2024'
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
