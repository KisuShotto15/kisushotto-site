<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS / Hub</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#08080c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KS">
<link rel="apple-touch-icon" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #08080c;
  --text: #e2e2ed;
  --muted: #3a3a52;
  --radius: 26px;
  --icon: 128px;
}

html { font-size: 16px; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(99,102,241,0.12) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 0% 110%, rgba(16,185,129,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 110% 100%, rgba(245,158,11,0.08) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 48px 48px 72px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 64px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.05s;
}

.logo img {
  height: 40px;
  width: auto;
  display: block;
  mix-blend-mode: screen;
}

.status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10b981;
  animation: blink 2.5s ease-in-out infinite;
}

/* ── App grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  row-gap: 40px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.2s;
}

/* ── App item ── */
.app {
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  position: relative;
  transition: transform 0.18s ease;
}

.app:hover {
  transform: translateY(-6px);
}

.app.dim {
  opacity: 0.28;
  pointer-events: none;
}

.icon {
  width: var(--icon);
  height: var(--icon);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 3.6rem;
  line-height: 1;
  background: #141419;
  overflow: hidden;
  flex-shrink: 0;
  transition: box-shadow 0.2s ease, transform 0.18s ease;
}

.app:hover .icon {
  box-shadow: 0 20px 48px rgba(0,0,0,0.6), 0 0 0 1px color-mix(in srgb, var(--c, white) 25%, transparent);
  transform: scale(1.04);
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
  display: block;
}

.name {
  font-size: 0.80rem;
  font-weight: 500;
  letter-spacing: -0.01em;
  text-align: center;
  color: rgba(255,255,255,0.75);
}

.soon {
  position: absolute;
  top: 8px;
  right: calc(50% - 64px - 8px + 4px);
  font-size: 0.50rem;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 2px 5px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

/* ── Responsive ── */
@media (max-width: 800px) {
  :root { --icon: 100px; --radius: 22px; }
  .grid { grid-template-columns: repeat(3, 1fr); row-gap: 32px; }
  .page { padding: 36px 32px 56px; }
}
@media (max-width: 520px) {
  :root { --icon: 76px; --radius: 18px; }
  .page { padding: 28px 20px 48px; }
  header { margin-bottom: 44px; }
  .logo img { height: 32px; }
  .grid { grid-template-columns: repeat(4, 1fr); gap: 4px; row-gap: 28px; }
  .name { font-size: 0.68rem; }
}
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="logo"><img src="/images/KS.png" alt="KS"></div>
    <div class="status"><span class="dot"></span>online</div>
  </header>

  <div class="grid">

    <a href="https://portfolio.kisushotto.com" class="app" style="--c:#f59e0b">
      <div class="icon" style="background:#f3f3f3"><img src="/images/portfolio-logo.png" alt="Portfolio"></div>
      <span class="name">Portfolio</span>
    </a>

    <a href="https://kisushotto.com/p2p-monitor" class="app" style="--c:#10b981">
      <div class="icon" style="background:#0a0b0e"><img src="/images/p2p-icon.svg" alt="P2P Monitor"></div>
      <span class="name">P2P Monitor</span>
    </a>

    <a href="https://kisushotto.com/trade-journal/" class="app" style="--c:#35c8f1">
      <div class="icon" style="background:#0a0b0e"><img src="/images/tj-icon.svg" alt="Trade Journal"></div>
      <span class="name">Trade Journal</span>
    </a>

    <a href="https://kisushotto.com/nutrition" class="app" style="--c:#a3e635">
      <div class="icon" style="background:#1a1a1f"><img src="/images/nutrition-icon.svg" alt="Nutrition"></div>
      <span class="name">Nutrition</span>
    </a>

    <a href="https://kisushotto.com/body-metrics/" class="app" style="--c:#3b82f6">
      <div class="icon" style="background:#0a0b0e"><img src="/images/bm-icon.svg" alt="Body Metrics"></div>
      <span class="name">Body Metrics</span>
    </a>

    <a href="https://kisushotto.com/habits/" class="app" style="--c:#8b5cf6">
      <div class="icon" style="background:#1a0d2e">🔥</div>
      <span class="name">Habits</span>
    </a>

    <a href="#" class="app dim" style="--c:#f43f5e">
      <span class="soon">soon</span>
      <div class="icon" style="background:#1a0a10">🧠</div>
      <span class="name">BTC Cards</span>
    </a>

    <a href="#" class="app dim" style="--c:#06b6d4">
      <span class="soon">soon</span>
      <div class="icon" style="background:#081418">⚙️</div>
      <span class="name">Workspace</span>
    </a>

  </div>

</div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
