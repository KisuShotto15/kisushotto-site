<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="dark">
<title>KS / Hub</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#08080c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KS">
<link rel="apple-touch-icon" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  color-scheme: dark;
  --bg: #08080c;
  --text: #e2e2ed;
  --muted: #3a3a52;
  --radius: 28px;
  --icon: 190px;
}

html { font-size: 16px; }
html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%, rgba(99,102,241,0.13) 0%, transparent 65%),
    radial-gradient(ellipse 50% 40% at 0% 110%, rgba(16,185,129,0.09) 0%, transparent 55%),
    radial-gradient(ellipse 50% 40% at 110% 100%, rgba(245,158,11,0.08) 0%, transparent 55%);
  pointer-events: none;
}

.page {
  position: relative;
  max-width: 1400px;
  margin: 0 auto;
  padding: 56px 60px 56px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 64px;
  opacity: 0;
  animation: fadeUp 0.45s ease forwards 0.05s;
}

.logo {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  overflow: hidden;
  flex-shrink: 0;
}
.logo img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: center 42%;
  display: block;
  mix-blend-mode: screen;
}

.status {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.68rem;
  color: var(--muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10b981;
  animation: blink 2.5s ease-in-out infinite;
}

/* ── App grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  row-gap: 56px;
}

/* ── App item ── */
.app {
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  position: relative;
  transition: transform 0.18s ease;
  /* staggered entrance */
  opacity: 0;
  animation: fadeUp 0.4s ease forwards;
}
.app:nth-child(1) { animation-delay: 0.12s; }
.app:nth-child(2) { animation-delay: 0.18s; }
.app:nth-child(3) { animation-delay: 0.24s; }
.app:nth-child(4) { animation-delay: 0.30s; }
.app:nth-child(5) { animation-delay: 0.36s; }
.app:nth-child(6) { animation-delay: 0.42s; }
.app:nth-child(7) { animation-delay: 0.48s; }
.app:nth-child(8) { animation-delay: 0.54s; }

.app:hover { transform: translateY(-7px); }
.app.dim { opacity: 0.28; pointer-events: none; }
.app.dim { animation: fadeUp 0.4s ease forwards 0.54s; }

.icon {
  width: var(--icon);
  height: var(--icon);
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 5.4rem;
  line-height: 1;
  background: #141419;
  overflow: hidden;
  flex-shrink: 0;
  transition: box-shadow 0.22s ease, transform 0.18s ease;
  /* prevent browser dark-mode from inverting icon backgrounds */
  color-scheme: light dark;
}

.app:hover .icon {
  box-shadow: 0 28px 64px rgba(0,0,0,0.7), 0 0 0 1px color-mix(in srgb, var(--c, white) 30%, transparent);
  transform: scale(1.05);
}

.icon img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: var(--radius);
  display: block;
  color-scheme: light dark;
}

.name {
  font-size: 1rem;
  font-weight: 500;
  letter-spacing: -0.01em;
  text-align: center;
  color: rgba(255,255,255,0.70);
  transition: color 0.18s ease;
}

.app:hover .name {
  color: color-mix(in srgb, var(--c, white) 80%, rgba(255,255,255,0.85));
}

.soon {
  position: absolute;
  top: 10px;
  right: calc(50% - var(--icon) / 2 - 2px);
  transform: translateX(100%) translateX(4px);
  font-size: 0.50rem;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 4px;
  padding: 2px 6px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

/* ── Responsive ── */
@media (max-width: 1100px) {
  :root { --icon: 155px; }
  .page { padding: 48px 40px 48px; }
}
@media (max-width: 800px) {
  :root { --icon: 130px; --radius: 24px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 24px; row-gap: 44px; }
  .page { padding: 40px 32px 40px; }
  .name { font-size: 0.95rem; }
}
@media (max-width: 480px) {
  :root { --icon: 140px; --radius: 22px; }
  .page { padding: 28px 20px 28px; }
  header { margin-bottom: 44px; }
  .logo { width: 38px; height: 38px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 16px; row-gap: 36px; }
  .name { font-size: 0.88rem; }
  .icon { font-size: 4.5rem; }
}
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="logo"><img src="/images/KS.png" alt="KS"></div>
    <div class="status"><span class="dot"></span>online</div>
  </header>

  <div class="grid">

    <a href="https://portfolio.kisushotto.com" class="app" style="--c:#f59e0b">
      <div class="icon" style="background:#f3f3f3"><img src="/images/portfolio-logo.png" alt="Portfolio"></div>
      <span class="name">Portfolio</span>
    </a>

    <a href="https://kisushotto.com/p2p-monitor" class="app" style="--c:#f0b90b">
      <div class="icon" style="background:#0d0f14"><img src="/images/p2p-icon.svg" alt="P2P Monitor"></div>
      <span class="name">P2P Monitor</span>
    </a>

    <a href="https://kisushotto.com/trade-journal/" class="app" style="--c:#35c8f1">
      <div class="icon" style="background:#0a0b0e"><img src="/images/tj-icon.svg" alt="Trade Journal"></div>
      <span class="name">Trade Journal</span>
    </a>

    <a href="https://kisushotto.com/nutrition" class="app" style="--c:#a3e635">
      <div class="icon" style="background:#1a1a1f"><img src="/images/nutrition-icon.svg" alt="Nutrition"></div>
      <span class="name">Nutrition</span>
    </a>

    <a href="https://kisushotto.com/body-metrics/" class="app" style="--c:#3b82f6">
      <div class="icon" style="background:#0a0b0e"><img src="/images/bm-icon.svg" alt="Body Metrics"></div>
      <span class="name">Body Metrics</span>
    </a>

    <a href="https://kisushotto.com/habits/" class="app" style="--c:#8b5cf6">
      <div class="icon" style="background:#1a0d2e">🔥</div>
      <span class="name">Habits</span>
    </a>

    <a href="#" class="app dim" style="--c:#f43f5e">
      <span class="soon">soon</span>
      <div class="icon" style="background:#1a0a10">🧠</div>
      <span class="name">BTC Cards</span>
    </a>

    <a href="#" class="app dim" style="--c:#06b6d4">
      <span class="soon">soon</span>
      <div class="icon" style="background:#081418">⚙️</div>
      <span class="name">Workspace</span>
    </a>

  </div>

</div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
