<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KS / Hub</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#08080c">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KS">
<link rel="apple-touch-icon" href="/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192x192.png">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #08080c;
  --surface:  #0d0d12;
  --border:   rgba(255,255,255,0.07);
  --border-h: rgba(255,255,255,0.15);
  --text:     #e2e2ed;
  --muted:    #3a3a52;
  --radius:   18px;
}

html { font-size: 20px; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* Mesh gradient background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%, rgba(99,102,241,0.10) 0%, transparent 65%),
    radial-gradient(ellipse 55% 40% at 0% 110%, rgba(16,185,129,0.08) 0%, transparent 55%),
    radial-gradient(ellipse 55% 40% at 110% 100%, rgba(245,158,11,0.07) 0%, transparent 55%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1400px;
  margin: 0 auto;
  padding: 40px 40px 60px;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Header ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 48px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.05s;
}

.logo img {
  height: 36px;
  width: auto;
  display: block;
}

.status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.10em;
  text-transform: uppercase;
}
.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #10b981;
  animation: blink 2.5s ease-in-out infinite;
}

/* ── Section label ── */
.label {
  font-size: 0.62rem;
  letter-spacing: 0.20em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 20px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.15s;
}

/* ── App grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  opacity: 0;
  animation: fadeUp 0.5s ease forwards 0.25s;
}

/* ── App card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  aspect-ratio: 1;
  text-decoration: none;
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  position: relative;
  transition: border-color 0.2s, transform 0.18s, box-shadow 0.2s;
  will-change: transform;
}

.card:hover {
  border-color: color-mix(in srgb, var(--c, white) 60%, transparent);
  transform: translateY(-4px);
  box-shadow: 0 24px 56px rgba(0,0,0,0.55), 0 0 0 1px color-mix(in srgb, var(--c, transparent) 40%, transparent);
}

.card.dim {
  opacity: 0.30;
  pointer-events: none;
}

.icon {
  font-size: 3rem;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 80px;
  height: 80px;
  border-radius: 18px;
  background: rgba(255,255,255,0.04);
  transition: background 0.2s, transform 0.18s;
  flex-shrink: 0;
}

.card:hover .icon {
  background: color-mix(in srgb, var(--c, transparent) 14%, rgba(255,255,255,0.04));
  transform: scale(1.06);
}

.name {
  font-size: 0.78rem;
  font-weight: 600;
  letter-spacing: -0.01em;
  text-align: center;
  color: var(--text);
}

.soon {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 0.48rem;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--muted);
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 3px 6px;
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.2; }
}

/* ── Responsive ── */
@media (max-width: 900px) {
  .grid { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 600px) {
  .page { padding: 28px 20px 48px; }
  header { margin-bottom: 36px; }
  .logo img { height: 28px; }
  .grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .icon { width: 64px; height: 64px; font-size: 2.4rem; }
}
</style>
</head>
<body>

<div class="page">

  <header>
    <div class="logo"><img src="/images/KS.png" alt="KS"></div>
    <div class="status"><span class="dot"></span>online</div>
  </header>

  <div class="label">apps &amp; tools</div>

  <div class="grid">

    <a href="https://portfolio.kisushotto.com" class="card" style="--c:#f59e0b">
      <div class="icon" style="background:#f3f3f3;padding:0;overflow:hidden"><img src="/images/portfolio-logo.png" style="width:100%;height:100%;object-fit:cover;border-radius:18px;display:block"></div>
      <span class="name">Portfolio</span>
    </a>

    <a href="https://kisushotto.com/p2p-monitor" class="card" style="--c:#10b981">
      <div class="icon" style="background:#0a0b0e;padding:0;overflow:hidden"><img src="/images/p2p-icon.svg" style="width:100%;height:100%;object-fit:cover;border-radius:18px;display:block"></div>
      <span class="name">P2P Monitor</span>
    </a>

    <a href="https://kisushotto.com/trade-journal/" class="card" style="--c:#35c8f1">
      <div class="icon" style="background:#0a0b0e;padding:0;overflow:hidden"><img src="/images/tj-icon.svg" style="width:100%;height:100%;object-fit:cover;border-radius:18px;display:block"></div>
      <span class="name">Trade Journal</span>
    </a>

    <a href="https://kisushotto.com/nutrition" class="card" style="--c:#a3e635">
      <div class="icon" style="background:#1a1a1f;padding:0;overflow:hidden"><img src="/images/nutrition-icon.svg" style="width:100%;height:100%;object-fit:cover;border-radius:18px;display:block"></div>
      <span class="name">Nutrition</span>
    </a>

    <a href="https://kisushotto.com/body-metrics/" class="card" style="--c:#3b82f6">
      <div class="icon" style="background:#0a0b0e;padding:0;overflow:hidden"><img src="/images/bm-icon.svg" style="width:100%;height:100%;object-fit:cover;border-radius:18px;display:block"></div>
      <span class="name">Body Metrics</span>
    </a>

    <a href="https://kisushotto.com/habits/" class="card" style="--c:#8b5cf6">
      <div class="icon">🔥</div>
      <span class="name">Habits</span>
    </a>

    <a href="#" class="card dim" style="--c:#f43f5e">
      <span class="soon">soon</span>
      <div class="icon">🧠</div>
      <span class="name">BTC Cards</span>
    </a>

    <a href="#" class="card dim" style="--c:#06b6d4">
      <span class="soon">soon</span>
      <div class="icon">⚙️</div>
      <span class="name">Workspace</span>
    </a>

  </div>

</div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
</body>
</html>
