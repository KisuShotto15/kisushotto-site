<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trades · Trade Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container" id="mainContainer">

  <a href="/" class="back-link">← hub</a>

  <nav class="page-nav">
    <a href="./index.html"     class="nav-link">dashboard</a>
    <a href="./trades.html"    class="nav-link active">trades</a>
    <a href="./analytics.html" class="nav-link">analytics</a>
    <a href="./insights.html"  class="nav-link">insights</a>
  </nav>

  <div class="page-header">
    <div class="page-header-label">// historial</div>
    <h1>TRADE <span>LIST</span></h1>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <select id="fExchange" onchange="applyFilters()">
      <option value="">Exchange</option>
      <option value="bybit">Bybit</option>
      <option value="binance">Binance</option>
    </select>
    <select id="fCategory" onchange="applyFilters()">
      <option value="">Categoría</option>
      <option value="linear">Linear</option>
      <option value="inverse">Inverse</option>
      <option value="spot">Spot</option>
    </select>
    <select id="fSide" onchange="applyFilters()">
      <option value="">Side</option>
      <option value="long">Long</option>
      <option value="short">Short</option>
    </select>
    <select id="fSession" onchange="applyFilters()">
      <option value="">Sesión</option>
      <option value="asia">Asia</option>
      <option value="london">London</option>
      <option value="ny">NY</option>
      <option value="other">Other</option>
    </select>
    <select id="fStatus" onchange="applyFilters()">
      <option value="">Status</option>
      <option value="closed">Closed</option>
      <option value="open">Open</option>
    </select>
    <input type="text" id="fSymbol" placeholder="Símbolo" style="width:120px" oninput="applyFiltersDebounced()">
    <input type="date" id="fFrom" onchange="applyFilters()" title="Desde">
    <input type="date" id="fTo"   onchange="applyFilters()" title="Hasta">
    <button class="btn btn-sm" onclick="resetFilters()">↺ Reset</button>
  </div>

  <!-- Mini summary -->
  <div id="miniSummary" class="mini-summary"></div>

  <!-- Table -->
  <div class="table-wrap">
    <table>
      <colgroup>
        <col class="col-num">
        <col class="col-symbol">
        <col class="col-side">
        <col class="col-price">
        <col class="col-price">
        <col class="col-size">
        <col class="col-pnl">
        <col class="col-session">
        <col class="col-hold">
        <col class="col-tag">
        <col class="col-tag">
        <col class="col-date">
      </colgroup>
      <thead>
        <tr>
          <th>#</th>
          <th>Símbolo</th>
          <th>Side</th>
          <th>Entry</th>
          <th>Exit</th>
          <th>Size</th>
          <th>PnL</th>
          <th>Sesión</th>
          <th>Duración</th>
          <th>Setup</th>
          <th>Estrategia</th>
          <th>Fecha</th>
        </tr>
      </thead>
      <tbody id="tradesBody"><tr><td colspan="12"><div class="loading">Cargando…</div></td></tr></tbody>
    </table>
  </div>

  <div class="pagination">
    <button class="btn btn-sm" id="btnPrev" onclick="prevPage()">← Anterior</button>
    <span id="pageInfo" style="color:var(--muted2)">Página 1</span>
    <button class="btn btn-sm" id="btnNext" onclick="nextPage()">Siguiente →</button>
  </div>

</div><!-- /container -->

<!-- Side panel -->
<div class="panel-backdrop hidden" id="panelBackdrop" onclick="closePanel()"></div>
<div class="side-panel hidden" id="sidePanel">
  <div class="panel-header">
    <div>
      <div id="panelSymbol" class="panel-symbol">—</div>
      <div id="panelMeta" class="panel-meta"></div>
    </div>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>

  <div class="panel-body">
    <!-- PnL highlight -->
    <div class="panel-pnl-row">
      <div class="panel-stat">
        <div class="panel-stat-label">PnL</div>
        <div class="panel-stat-val" id="panelPnl">—</div>
      </div>
      <div class="panel-stat">
        <div class="panel-stat-label">Entry</div>
        <div class="panel-stat-val" id="panelEntry">—</div>
      </div>
      <div class="panel-stat">
        <div class="panel-stat-label">Exit</div>
        <div class="panel-stat-val" id="panelExit">—</div>
      </div>
      <div class="panel-stat">
        <div class="panel-stat-label">Size</div>
        <div class="panel-stat-val" id="panelSize">—</div>
      </div>
    </div>

    <!-- Divider -->
    <div class="panel-divider"></div>

    <!-- Setup tags -->
    <div class="panel-section">
      <div class="panel-section-label">Setup</div>
      <div class="tag-grid" id="tagSetup"></div>
    </div>

    <!-- Strategy tags -->
    <div class="panel-section">
      <div class="panel-section-label">Estrategia</div>
      <div class="tag-grid" id="tagStrategy"></div>
    </div>

    <!-- Emotion tags -->
    <div class="panel-section">
      <div class="panel-section-label">Emoción</div>
      <div class="tag-grid" id="tagEmotion"></div>
    </div>

    <!-- Rule score -->
    <div class="panel-section">
      <div class="panel-section-label">Rule Score</div>
      <div class="rule-score-row" id="ruleScoreRow"></div>
    </div>

    <!-- Notes -->
    <div class="panel-section">
      <div class="panel-section-label">Notas</div>
      <textarea id="panelNotes" class="panel-textarea" placeholder="Describe el contexto, confluencias, errores…"></textarea>
    </div>

    <div class="panel-divider"></div>

    <!-- Save -->
    <button class="btn btn-accent" style="width:100%" onclick="savePanel()">Guardar cambios</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./trades.js"></script>
</body>
</html>
