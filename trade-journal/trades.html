<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trades · Trade Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/images/tj-favicon.svg">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container" id="mainContainer">

  <nav class="left-nav">
    <a href="/" class="left-nav-back" title="Hub">
      <img src="/images/tj-favicon.png" style="width:36px;height:36px;border-radius:9px;object-fit:cover;display:block">
    </a>
    <div class="left-nav-divider"></div>
    <a href="./index.html" class="left-nav-item" title="Dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </a>
    <a href="./trades.html" class="left-nav-item active" title="Trades">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    </a>
    <a href="./analytics.html" class="left-nav-item" title="Analytics">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    </a>
    <a href="./insights.html" class="left-nav-item" title="Insights">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18h6M10 22h4M12 2a7 7 0 017 7c0 3-1.5 5-4 6.5V17a1 1 0 01-1 1h-4a1 1 0 01-1-1v-1.5C6.5 14 5 12 5 9a7 7 0 017-7z"/></svg>
    </a>
  </nav>

  <div class="page-header">
    <div class="page-header-label">// historial</div>
    <h1>TRADE <span>LIST</span></h1>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <select id="fExchange" onchange="applyFilters()">
      <option value="">Exchange</option>
      <option value="bybit">Bybit</option>
      <option value="binance">Binance</option>
    </select>
    <select id="fCategory" onchange="applyFilters()">
      <option value="">Categoría</option>
      <option value="linear">Linear</option>
      <option value="inverse">Inverse</option>
      <option value="spot">Spot</option>
    </select>
    <select id="fSide" onchange="applyFilters()">
      <option value="">Side</option>
      <option value="long">Long</option>
      <option value="short">Short</option>
    </select>
    <select id="fSession" onchange="applyFilters()">
      <option value="">Sesión</option>
      <option value="asia">Asia</option>
      <option value="london">London</option>
      <option value="ny">NY</option>
      <option value="other">Other</option>
    </select>
    <select id="fStatus" onchange="applyFilters()">
      <option value="">Status</option>
      <option value="closed">Closed</option>
      <option value="open">Open</option>
    </select>
    <input type="text" id="fSymbol" placeholder="Símbolo" style="width:120px" oninput="applyFiltersDebounced()">
    <input type="date" id="fFrom" onchange="applyFilters()" title="Desde">
    <input type="date" id="fTo"   onchange="applyFilters()" title="Hasta">
    <button class="btn btn-sm" onclick="resetFilters()">↺ Reset</button>
  </div>

  <!-- Mini summary -->
  <div id="miniSummary" class="mini-summary"></div>

  <!-- Trades list -->
  <div class="trades-list">
    <div class="tc-header">
      <div class="tc-header-cell">Símbolo</div>
      <div class="tc-header-cell">Side</div>
      <div class="tc-header-cell">Open → Close</div>
      <div class="tc-header-cell">Entry / Exit</div>
      <div class="tc-header-cell">P&L</div>
      <div class="tc-header-cell">Duración</div>
      <div></div>
    </div>
    <div id="tradesBody"><div class="loading">Cargando…</div></div>
  </div>

  <div class="pagination">
    <button class="btn btn-sm" id="btnPrev" onclick="prevPage()">← Anterior</button>
    <span id="pageInfo" style="color:var(--muted2)">Página 1</span>
    <button class="btn btn-sm" id="btnNext" onclick="nextPage()">Siguiente →</button>
  </div>

</div><!-- /container -->

<div class="toast" id="toast"></div>
<script type="module" src="./trades.js"></script>
</body>
</html>
