<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights · Trade Journal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="/images/tj-favicon.png">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<div class="container">

  <nav class="left-nav">
    <a href="/" class="left-nav-back" title="Hub">
      <img src="/images/tj-favicon.png" style="width:36px;height:36px;border-radius:9px;object-fit:cover;display:block">

    <a href="./index.html" class="left-nav-item" title="Dashboard">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
    </a>
    <a href="./trades.html" class="left-nav-item" title="Trades">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    </a>
    <a href="./analytics.html" class="left-nav-item" title="Analytics">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
    </a>
    <a href="./insights.html" class="left-nav-item active" title="Insights">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9 18h6M10 22h4M12 2a7 7 0 017 7c0 3-1.5 5-4 6.5V17a1 1 0 01-1 1h-4a1 1 0 01-1-1v-1.5C6.5 14 5 12 5 9a7 7 0 017-7z"/></svg>
    </a>
  </nav>

  <div class="page-header" style="display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px">
    <div>
      <div class="page-header-label">// behavioral analytics</div>
      <h1>TRADING <span>INSIGHTS</span></h1>
    </div>
    <button class="btn btn-accent" id="refreshBtn" onclick="doRefresh()">↻ Regenerar insights</button>
  </div>

  <div class="section-card">
    <!-- Filter chips -->
    <div style="display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap">
      <button class="isect-tab active" onclick="filterInsights('all',this)">Todos</button>
      <button class="isect-tab" onclick="filterInsights('critical',this)">🔴 Críticos</button>
      <button class="isect-tab" onclick="filterInsights('warning',this)">🟡 Advertencias</button>
      <button class="isect-tab" onclick="filterInsights('info',this)">🔵 Info</button>
    </div>
    <div id="insightsContainer"><div class="loading">Cargando…</div></div>
  </div>

</div>
<div class="toast" id="toast"></div>
<script type="module" src="./insights-page.js"></script>
